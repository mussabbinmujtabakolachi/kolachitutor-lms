# Render Blueprint
# Learn more: https://render.com/docs/blueprints

services:
  - type: web
    name: kolachi-tutor-lms
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: kolachi-lms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: admin@kolachi.edu.pk
      - key: ADMIN_PASSWORD
        value: admin123

databases:
  - name: kolachi-lms-db
    plan: free
    databaseName: kolachi_lms
    ipAllowList: []
